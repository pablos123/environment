# deps: sudo apt install -y htop iotop nethogs ncdu iptraf-ng lsof fzf
# sudo password is provided via SUDO_ASKPASS (set by kitty-sessions through zenity)

new_tab htop
launch bash -c "export TERM=xterm-256color; while true; do start=$SECONDS; htop; (( SECONDS - start < 1 )) && break; done; exec bash -l"

new_tab iotop
launch bash -c "export TERM=xterm-256color; while true; do start=$SECONDS; sudo -A iotop -o; (( SECONDS - start < 1 )) && break; done; exec bash -l"

new_tab nethogs
launch bash -c "export TERM=xterm-256color; while true; do start=$SECONDS; sudo -A nethogs; (( SECONDS - start < 1 )) && break; done; exec bash -l"

new_tab iptraf
launch bash -c "export TERM=xterm-256color; while true; do start=$SECONDS; sudo -A iptraf-ng -i all; (( SECONDS - start < 1 )) && break; done; exec bash -l"

new_tab disk-usage
launch bash -c "export TERM=xterm-256color; while true; do start=$SECONDS; sudo -A ncdu /; (( SECONDS - start < 1 )) && break; done; exec bash -l"

new_tab journal
launch bash -c "while true; do start=$SECONDS; sudo -A journalctl -f; (( SECONDS - start < 1 )) && break; done; exec bash -l"

new_tab listening-ports
launch bash -c "[ -f ~/.fzf.bash ] && source ~/.fzf.bash; export TERM=xterm-256color; while true; do start=$SECONDS; sudo -A lsof -iTCP -sTCP:LISTEN -P -n | fzf --header-lines=1 >/dev/null; (( SECONDS - start < 1 )) && break; done; exec bash -l"
